    <div class="form-box-small">
        <div class="form-container">
            <h1>
                <!--help from chatgpt for resizing -->
                Feedback Form 
                <img src="images/lickiesfavicon.png"
                alt="lickies ice cream icon"
                class="icon">
            </h1>
            <p>Please fill out the form below to provide your feedback about our products and services.</p>
                        
            <form action="Thankyou_ff.html" method="get">
            <label for="custname">Your name:</label><br>
            <input type="text" name="custname" id="custname" size="30"
            placeholder="e.g. Tan Wei" required><br>


                                    
            <label for="email">E-mail:</label><br>
            <input type="email" name="email" id="email" size="30"
            placeholder="you@example.com" required><br>


            <label for="feedback">Your Feedback:</label><br>
            <div class="textarea">
            <textarea name="feedback" id="feedback" rows="7" cols="50"
            placeholder="Enter your feedback here..." required></textarea><br>

            <div class="button-clear">
            <button class="btn submit">Send Feedback</button>
            <input type="reset" value="Clear Form"></button></div>

        </div>
