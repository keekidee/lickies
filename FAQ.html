            <data class="form-page-box">
            <div class="body">

            <h1>Feedback Form </h1>
            <p>Please fill out the form below to provide your feedback about our products and services.</p>



    <form action="thankyou.html" method="get">

       <label for="custname">Your name:</label><br></div.a>
       <input type="text" name="custname" id="custname" size="30"
               placeholder="e.g. Tan Wei" required>
        <br>


        <label for="email">E-mail:</label><br></div.a>
        <input type="email" name="email" id="email" size="30"
               placeholder="you@example.com" required>
        <br>
        <label for="feedback">Your Feedback:</label><br>
        <div class="textarea">
        <textarea name="feedback" id="feedback" rows="6" cols="50" 
        placeholder="Enter your feedback here..." required></textarea><br></div>

        <button class="btn submit">Submit Feedback</button>
        <input type="reset"  value="Clear Form">
    </form>
