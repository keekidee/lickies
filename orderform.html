<body>

   <div class="form-box-big">
    <div class="body">
    <h1>Lickies — Order Form </h1>



    <form action="Thankyou_of.html" method="get">

        <label for="custname">Your name:</label><br>
       <input type="text" name="custname" id="custname" 
               placeholder="e.g. Tan Wei" required>
        <br></div>


        <label for="email">E-mail:</label><br>
        <input type="email" name="email" id="email" size="30"
               placeholder="you@example.com" required>
        <br>

    
        <label for="qty">How many scoops? (1–3):</label><br>
        <input type="number" name="qty" id="qty" min="1" max="3" value="1">
        <br>

        <label for="Date">Date(monday to sunday):</label><br>
        <input type="date" name="Date" id="Date">
        <br>


        <!-- ============================================================
             ⭐ CHALLENGE: Datalist — a text box WITH suggestions.
             TODO (a): add  list="flavours"  to the input below
             TODO (b): under it, create:
                  <datalist id="flavours">
                      <option value="Taro">
                      <option value="Matcha">
                      <option value="Honeydew">
                  </datalist>
             The list id must match the input's list attribute!
             ============================================================ -->

        <label for="first">Flavour choice<br> 1st Scoop :</label><br>
        <input type="text" name="choice" id="first" list="flavours-mandatory"><br>
        <datalist id="flavours-mandatory">
            <option value="Vanilla Strawberry Milkshake">
            <option value="Mint brownie">
            <option value="Cookies & Cream">
            <option value="Mixed Berries">
            <option value="Thai Milk Tea">
            <option value="Cherry & Jasmine">
            <option value="Cinnnamon & Coffee">
            <option value="Biscoff & Banana">
            <option value="Strawberry Matcha">
            <option value="Pistachio & Honeycomb">
            <option value="Tiramisu">
          </datalist><br>

        <label for="Second"> 2nd Scoop :</label><br>
        <input type="text" name="choice2" id="Second" list="flavours-optional"><br>
        <datalist id="flavours-optional">
            <option value="Vanilla Strawberry Milkshake">
            <option value="Mint brownie">
            <option value="Cookies & Cream">
            <option value="Mixed Berries">
            <option value="Thai Milk Tea">
            <option value="Cherry & Jasmine">
            <option value="Cinnnamon & Coffee">
            <option value="Biscoff & Banana">
            <option value="Strawberry Matcha">
            <option value="Pistachio & Honeycomb">
            <option value="Tiramisu">
            <option value="None">
        </datalist><br>
         <label for="Third"> 3rd Scoop</label><br>
        <input type="text" name="choice3" id="Third" list="flavours-optional"><br>
        <datalist id="flavours-optional">
            <option value="Vanilla Strawberry Milkshake">
            <option value="Mint brownie">
            <option value="Cookies & Cream">
            <option value="Mixed Berries">
            <option value="Thai Milk Tea">
            <option value="Cherry & Jasmine">
            <option value="Cinnnamon & Coffee">
            <option value="Biscoff & Banana">
            <option value="Strawberry Matcha">
            <option value="Pistachio & Honeycomb">
            <option value="Tiramisu">
            <option value="None">
        </datalist><br>

        <label for="topping">Topping choice</label><br>
        <label><input type="checkbox"
            name="Strawberry drizzle" value="yes"> Strawberry drizzle</label><br>
        <label><input type="checkbox"
            name="Chocolate drizzle" value="yes"> Chocolate drizzle</label><br>
        <label><input type="checkbox"
            name="Caramel drizzle" value="yes"> Caramel drizzle</label><br>
        <label><input type="checkbox"
            name="Honey drizzle" value="yes"> Honey drizzle</label><br>
        <label><input type="checkbox"
            name="Marshmallow" value="yes"> Marshmallow</label><br>
        <label><input type="checkbox"
            name="Chocolate sprinkles" value="yes"> Chocolate sprinkles</label><br>
        <label><input type="checkbox"
            name="crushed peanuts" value="yes"> Crushed Peanuts</label><br>
        <label><input type="checkbox"
            name="Rainbow sprinkles" value="yes"> Rainbow sprinkles</label><br>
        <label><input type="checkbox"
            name="Popping candy" value="yes"> Popping Candy</label><br>
        <label><input type="checkbox"
            name="popping pearl" value="yes"> Popping Pearl</label><br>
        <label><input type="checkbox"
            name="Freeze Dried Fruits Mix" value="yes"> Freeze Dried Fruits Mix</label><br>
          
          
          
        
        

          <!-- ============================================================
             TASK 5: Special requests + buttons.
             TODO (a): add a <textarea name="notes" id="notes"
                       rows="4" cols="40"></textarea> under the label

                       <input type="submit" value="Place Order">
                       <input type="reset"  value="Clear Form">
             ============================================================ -->
        <p><label for="notes">Special requests:</label></p>
        <!-- TODO Task 5a: textarea here -->
         <div class="textarea">
            <textarea name="notes" id="notes" rows="4" cols="40"></textarea><div>
    
        <!-- TODO Task 5b: submit + reset buttons here -->
         <p><label for="Donations">Donations($):</label></p>
         <input type="number" name="donations" id="donations"
         placeholder="e.g. $1.00">

        <p>
        <button class="btn submit">Place Order</button>
        <input type="reset"  value="Clear Form">
        </p>
